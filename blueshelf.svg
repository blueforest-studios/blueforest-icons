<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- BlueShelf icon: three books on a shelf, one blue accent book, black-outline family style -->
  <!-- book 1 (white, upright) -->
  <rect x="120" y="170" width="66" height="216" rx="16"
        fill="#FFFFFF" stroke="#000000" stroke-width="28" stroke-linejoin="round"/>
  <line x1="120" y1="240" x2="186" y2="240" stroke="#000000" stroke-width="20"/>
  <!-- book 2 (blue accent, upright, tallest) -->
  <rect x="196" y="132" width="66" height="254" rx="16"
        fill="#009FE0" stroke="#000000" stroke-width="28" stroke-linejoin="round"/>
  <line x1="196" y1="200" x2="262" y2="200" stroke="#000000" stroke-width="20"/>
  <!-- book 3 (white, leaning right) -->
  <rect x="286" y="176" width="62" height="214" rx="15"
        fill="#FFFFFF" stroke="#000000" stroke-width="28" stroke-linejoin="round"
        transform="rotate(11 317 283)"/>
  <!-- shelf -->
  <path d="M 96 402 H 416" fill="none" stroke="#000000" stroke-width="34" stroke-linecap="round"/>
  <path d="M 120 402 V 428 M 392 402 V 428" fill="none" stroke="#000000" stroke-width="28" stroke-linecap="round"/>
</svg>
